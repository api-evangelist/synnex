specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Synnex
providerId: synnex
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - IT Distribution
  - Cloud Marketplace
  - Rate Limiting
description: TD SYNNEX does not publish standard production rate-limit numbers for the StreamOne ION or Digital Bridge APIs. The only quantitative limits in the public docs are Microsoft sandbox-testing limits. Production throttling is provisioned per partner during onboarding.
sources:
  - https://docs.streamone.cloud/
  - https://www.tdsynnex.com/ion/api/
notes: Production rate limits are not publicly documented. Only the Microsoft sandbox limits (5 customers per sandbox, 5 products per customer) are stated; these are testing constraints, not production throughput limits.
responseCodes:
  throttled: 429
limits:
  - name: Microsoft Sandbox Customers
    scope: sandbox
    metric: customers
    limit: 5
    notes: Maximum customers per sandbox - testing constraint, not a production rate limit.
  - name: Microsoft Sandbox Products per Customer
    scope: sandbox
    metric: products
    limit: 5
    notes: Maximum products per sandbox customer - testing constraint, not a production rate limit.
  - name: Production Limits
    scope: partner
    metric: varies
    limit: 'partner-provisioned at onboarding; not publicly documented'
policies:
  - name: Partner Onboarding
    description: Production credentials, throughput, and SLA targets are issued by TD SYNNEX after partner-agreement onboarding via the StreamOne ION / Digital Bridge developer programs.
  - name: OAuth 2.0
    description: Both APIs authenticate via OAuth 2.0; rate-limit scoping is per partner credential.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
