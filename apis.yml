aid: synnex
name: Synnex
description: SYNNEX Corporation (now TD SYNNEX) is a Fortune 100 global IT distribution company and solutions aggregator that
  connects technology vendors with resellers, system integrators, and enterprise customers. The company provides comprehensive
  API access through its StreamOne ION platform for managing cloud subscriptions, product catalogs, customer accounts, and
  orders. TD SYNNEX was formed in 2021 through the merger of Synnex Corporation and Tech Data.
