apis:
- aid: synnex:streamone-ion
  name: TD SYNNEX StreamOne ION API
  description: The StreamOne ION API is TD SYNNEX's interface for cloud vendors and reseller partners to manage cloud subscriptions,
    product catalogs, end customers, and orders through a unified platform. The API supports end customer management, product
    operations, order management, subscription lifecycle, shopping cart workflows, and reporting via OAuth 2.0 authentication.
