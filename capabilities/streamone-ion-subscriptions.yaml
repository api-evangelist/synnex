      description: REST surface for accounts-accountId-customers-customerId-subscriptions.
      operations:
      - method: GET
        name: listsubscriptions
        description: List Subscriptions
        call: streamone-ion-subscriptions.listsubscriptions
        outputParameters:
        - type: object
