naftiko: 1.0.0-alpha2
info:
  label: TD SYNNEX StreamOne ION API — Products
  description: 'TD SYNNEX StreamOne ION API — Products. 2 operations. Lead operation: List Products. Self-contained Naftiko
    capability covering one Synnex business surface.'
  tags:
  - Synnex
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYNNEX_API_KEY: SYNNEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: streamone-ion-products
    baseUri: https://ion.tdsynnex.com/api/v3
    description: TD SYNNEX StreamOne ION API — Products business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-products
      path: /accounts/{accountId}/products
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vendor
          in: query
          type: string
          description: Filter by vendor name.
        - name: category
          in: query
          type: string
        - name: currency
          in: query
          type: string
    - name: accounts-accountId-products-productId
      path: /accounts/{accountId}/products/{productId}
      operations:
      - name: getproduct
        method: GET
        description: Get Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SYNNEX_API_KEY}}'
  exposes:
  - type: rest
    namespace: streamone-ion-products-rest
    port: 8080
    description: REST adapter for TD SYNNEX StreamOne ION API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/products
      name: accounts-accountid-products
      description: REST surface for accounts-accountId-products.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: streamone-ion-products.listproducts
        with:
          vendor: rest.vendor
          category: rest.category
          currency: rest.currency
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/products/{productid}
      name: accounts-accountid-products-productid
      description: REST surface for accounts-accountId-products-productId.
      operations:
      - method: GET
        name: getproduct
        description: Get Product
        call: streamone-ion-products.getproduct
        with:
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streamone-ion-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for TD SYNNEX StreamOne ION API — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streamone-ion-products.listproducts
      with:
        vendor: tools.vendor
        category: tools.category
        currency: tools.currency
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streamone-ion-products.getproduct
      with:
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
