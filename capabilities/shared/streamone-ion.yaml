naftiko: "1.0.0-alpha1"

info:
  label: "TD SYNNEX StreamOne ION API"
  description: "Cloud marketplace and IT distribution API for managing customers, products, orders, subscriptions, and reporting."
  tags:
    - TD SYNNEX
    - Cloud Marketplace
    - IT Distribution
    - Subscription Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYNNEX_ION_ACCESS_TOKEN: SYNNEX_ION_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: synnex-ion
      baseUri: https://ion.tdsynnex.com/api/v3
      description: "TD SYNNEX StreamOne ION V3 API for cloud subscription management."
      authentication:
        type: bearer
        token: "{{SYNNEX_ION_ACCESS_TOKEN}}"
      resources:
        - name: customers
          path: /accounts/{accountId}/customers
          description: "End customer account management."
          operations:
            - name: list-customers
              method: GET
              description: "Retrieves a list of end customers for the reseller account."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: pageSize
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer
              method: POST
              description: "Creates a new end customer account."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: companyName
                  in: body
                  type: string
                  required: true
                - name: email
                  in: body
                  type: string
                  required: true
                - name: country
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  companyName: "{{tools.companyName}}"
                  email: "{{tools.email}}"
                  country: "{{tools.country}}"

        - name: products
          path: /accounts/{accountId}/products
          description: "Product catalog operations."
          operations:
            - name: list-products
              method: GET
              description: "Retrieves the product catalog available to the reseller."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: vendor
                  in: query
                  type: string
                  required: false
                - name: category
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: orders
          path: /accounts/{accountId}/orders
          description: "Order management operations."
          operations:
            - name: list-orders
              method: GET
              description: "Retrieves a list of orders for the reseller account."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: status
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-order
              method: POST
              description: "Creates a new order for cloud products on behalf of an end customer."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: customerId
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  customerId: "{{tools.customerId}}"

        - name: subscriptions
          path: /accounts/{accountId}/customers/{customerId}/subscriptions
          description: "Cloud subscription lifecycle management."
          operations:
            - name: list-subscriptions
              method: GET
              description: "Retrieves cloud subscriptions for a specific end customer."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: customerId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /accounts/{accountId}/reports
          description: "Usage and billing reports."
          operations:
            - name: list-reports
              method: GET
              description: "Retrieves available reports with metadata."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: format
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: synnex-ion-api
      resources:
        - path: /v1/customers
          name: customers
          operations:
            - method: GET
              name: list-customers
              call: "synnex-ion.list-customers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: synnex-ion-mcp
      transport: http
      tools:
        - name: list-customers
          description: "List end customers for the reseller account."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "synnex-ion.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
