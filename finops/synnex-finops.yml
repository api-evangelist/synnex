specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Synnex
providerId: synnex
publisherName: TD SYNNEX Corporation
serviceCategory: IT Distribution / Cloud Marketplace
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - IT Distribution
  - Cloud Marketplace
  - FinOps
  - FOCUS
description: TD SYNNEX's APIs (StreamOne ION, Digital Bridge) drive reseller order, subscription, and entitlement workflows; settlement happens through the distribution agreement (cost-plus on resold cloud and IT product), not as a per-API charge.
sources:
  - https://www.tdsynnex.com
  - https://docs.streamone.cloud/
notes: No FOCUS-aligned per-call billing surface. Cost / margin reconciles at the resold-product level (Microsoft CSP, Google Workspace, hardware SKUs) through TD SYNNEX's reseller settlement.
billingModel:
  pricingCategory: Reseller Pass-Through
  billingFrequency: Per-Order / Subscription Settlement
  billingCurrency: 'USD (settlement varies by region)'
  chargeCategories:
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: TD SYNNEX APIs (StreamOne ION, Digital Bridge)
  ServiceCategory: IT Distribution / Cloud Marketplace
  ProviderName: TD SYNNEX
  PublisherName: TD SYNNEX Corporation
  InvoiceIssuerName: TD SYNNEX Corporation
  BillingCurrency: USD
meters:
  - name: cloud_subscriptions
    description: Active resold cloud subscriptions managed via StreamOne ION (CSP seats, Google Workspace seats, etc.).
    unit: subscription-month
    aggregation: max
    dimensions:
      - vendor
      - end_customer
  - name: orders
    description: Orders placed through the API (StreamOne ION orders, Digital Bridge product orders).
    unit: order
    aggregation: sum
    dimensions:
      - vendor
      - end_customer
  - name: catalog_lookups
    description: Product / pricing lookup calls; not separately billed but useful for capacity planning.
    unit: request
    aggregation: sum
principles:
  - name: Visibility
    description: Resellers reconcile API-driven activity against TD SYNNEX reseller reporting; subscription, order, and renewal data are exposed through the partner reporting endpoints.
  - name: Allocation
    description: Allocate by end-customer and vendor (Microsoft, Google, hardware OEM) - the same dimensions TD SYNNEX uses on the reseller statement.
  - name: Optimization
    description: Optimize by automating renewal and cancellation flows, batching catalog syncs, and using StreamOne ION reports to surface dormant subscriptions before settlement.
  - name: Accountability
    description: Reseller's commercial team owns end-customer P&L; TD SYNNEX partner-management owns the distribution-agreement relationship and settlement timing.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
