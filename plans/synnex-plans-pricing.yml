description: TD SYNNEX (formerly Synnex) is a Fortune 100 IT distributor. The StreamOne ION and Digital Bridge APIs are reseller/partner-gated - credentials must be obtained from TD SYNNEX after a partner agreement. There is no published per-API price; commercial terms are bundled into the distribution/reseller contract.
sources:
  - https://www.tdsynnex.com
  - https://www.tdsynnex.com/ion/api/
  - https://docs.streamone.cloud/
notes: API access is partner-gated. The docs explicitly note "User must obtain the login credentials from StreamOne Ion/TD SYNNEX before authentication." The only quantitative limits documented are Microsoft sandbox testing limits (5 customers per sandbox, 5 products per customer); production limits are not published.
plans:
  - id: synnex-contact-sales
    name: Contact Sales
    type: enterprise
    description: Reseller / partner integration access bundled with a TD SYNNEX distribution agreement. API access is provisioned post-onboarding.
    entries:
