        name: reseller_integration
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: TD SYNNEX StreamOne ION API
      - name: TD SYNNEX Digital Bridge API
      - name: Sandbox Environment
      - name: Bundled with Distribution Agreement
